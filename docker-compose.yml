services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: engram-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  fastembed:
    build:
      context: ./docker/fastembed
      dockerfile: Dockerfile
    container_name: engram-fastembed
    ports:
      - "11435:8000"
    environment:
      - MODEL_NAME=nomic-ai/nomic-embed-text-v1.5
      - MAX_WORKERS=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  mcp:
    build:
      context: .
      dockerfile: docker/mcp/Dockerfile
    container_name: engram-mcp
    ports:
      - "8585:8585"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - FASTEMBED_URL=http://fastembed:8000
      - COLLECTION_NAME=agent-memory
      - DATA_DIR=/data/engram
      - ENGRAM_API_KEY=${ENGRAM_API_KEY:-}
      - ENGRAM_API_URL=${ENGRAM_API_URL:-https://api.engrammemory.ai}
    volumes:
      - engram_state:/data/engram
    depends_on:
      qdrant:
        condition: service_healthy
      fastembed:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qdrant_storage:
    driver: local
  engram_state:
    driver: local
